[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "Image_Kit"
version = "0.1.5"
description = "A simple image edit"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Brandon Chew", email = "chewbrandon9911@gmail.com"}
]
dependencies = ["Pillow>=9.0.0"]  # You need this dependency!

[project.scripts]
imagekit = "app:main"  # Creates 'imagekit' command that calls main() from app.py
